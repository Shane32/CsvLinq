name: Publish release

on:
  release:
    types:
      - published
  push:
    branches:
      - master
      - develop

jobs:
  publish:
    uses: Shane32/SharedWorkflows/.github/workflows/publish-nuget.yml@v2
    permissions:
      contents: write
      packages: write
    with:
      dotnet_folder: src/Project
    secrets:
      NUGET_AUTH_TOKEN: ${{ secrets.NUGET_AUTH_TOKEN }}
